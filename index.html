<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOU WON'T BELIEVE THIS...</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #222;
      --accent: #ff3c3c; --accent2: #ffcc00; --text: #eee;
      --glow: rgba(255,60,60,0.35);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35; pointer-events: none;
    }
    .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 32px; text-align: center; }

    .title {
      font-family: 'Bebas Neue', sans-serif; 
      font-size: clamp(2.8rem, 8vw, 5.5rem); 
      letter-spacing: .08em; 
      line-height: 1.05;
      text-shadow: 0 0 30px rgba(255,60,60,0.4);
    }
    .title span { color: var(--accent2); }

    .subtitle {
      font-size: 1.35rem;
      color: #aaa;
      max-width: 620px;
      line-height: 1.4;
    }

    .trap-wrapper { position: relative; }
    
    .trap-img {
      width: clamp(280px, 52vw, 520px);
      aspect-ratio: 16/9;
      border-radius: 12px;
      border: 3px solid #222;
      cursor: pointer;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      transition: all 0.25s ease;
      position: relative;
    }
    
    .trap-img:hover {
      transform: scale(1.04);
      border-color: var(--accent);
      box-shadow: 0 0 50px var(--glow);
    }

    .fake-thumb {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px;
      position: relative;
    }

    .fake-thumb::before {
      content: '▶';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4.5rem;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 0 40px rgba(255,255,255,0.6);
      transition: transform 0.3s ease;
    }

    .trap-img:hover .fake-thumb::before {
      transform: translate(-50%, -50%) scale(1.2);
    }

    .fake-thumb-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.45rem;
      letter-spacing: .06em;
      line-height: 1.15;
      text-shadow: 0 4px 12px rgba(0,0,0,0.9);
    }

    .fake-thumb-sub {
      margin-top: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
    }

    .badge {
      position: absolute;
      top: -14px; right: -14px;
      background: #ff3c3c;
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: .12em;
      padding: 6px 16px;
      border-radius: 6px;
      box-shadow: 0 0 20px rgba(255,60,60,0.6);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      font-family: 'DM Mono', monospace;
      z-index: 10;
    }

    .overlay.show { display: flex; }

    .loading {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top: 4px solid #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: #111;
      border: 2px solid #333;
      border-radius: 9999px;
      padding: 14px 32px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: #ccc;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    .corner {
      position: fixed; width: 70px; height: 70px;
      border-color: #1e1e1e; border-style: solid; opacity: 0.5;
    }
    .corner.tl{top:24px;left:24px;border-width:2px 0 0 2px}
    .corner.tr{top:24px;right:24px;border-width:2px 2px 0 0}
    .corner.bl{bottom:24px;left:24px;border-width:0 0 2px 2px}
    .corner.br{bottom:24px;right:24px;border-width:0 2px 2px 0}
  </style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <div class="title">YOU WON'T BELIEVE<br>WHAT HAPPENS <span>NEXT</span></div>
    <div class="subtitle">Click the video if you dare 😈</div>

    <div class="trap-wrapper">
      <div class="badge">VIRAL</div>
      <div class="trap-img" id="trap">
        <div class="fake-thumb">
          <div class="fake-thumb-label">INSANE MOMENT CAUGHT ON CAMERA</div>
          <div class="fake-thumb-sub">definitely-not-a-trap.mp4 • 4:20 • 12M views</div>
        </div>

        <!-- Fake video overlay -->
        <div class="overlay" id="overlay">
          <div class="loading"></div>
          <div style="font-size:1.1rem; margin-bottom:8px;">LOADING VIDEO...</div>
          <div style="font-size:0.75rem; opacity:0.7;">This is gonna be good</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">😂 Nice try</div>

  <script>
    const trap = document.getElementById('trap');
    const overlay = document.getElementById('overlay');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }

    trap.addEventListener('click', () => {
      overlay.classList.add('show');
      
      // Fake "loading" then funny message
      setTimeout(() => {
        showToast("😂 Bro really clicked it");
      }, 1200);

      // Auto hide overlay after a while
      setTimeout(() => {
        overlay.classList.remove('show');
      }, 4500);
    });

    // Easter egg: hold click for extra fun
    let holdTimer;
    trap.addEventListener('mousedown', () => {
      holdTimer = setTimeout(() => {
        showToast("🫵 You held it too long lol");
      }, 800);
    });

    trap.addEventListener('mouseup', () => clearTimeout(holdTimer));
    trap.addEventListener('mouseleave', () => clearTimeout(holdTimer));
  </script>
</body>
</html>
