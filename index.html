<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrapFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ───── TOKENS ───── */
    :root {
      --bg:          #090909;
      --surface:     #111113;
      --surface2:    #18181c;
      --border:      #252529;
      --border2:     #32323a;
      --text:        #e2dfd8;
      --muted:       #5a5a65;
      --muted2:      #3a3a42;
      --accent:      #c8f135;
      --accent-dim:  rgba(200,241,53,.12);
      --accent-glow: rgba(200,241,53,.06);
      --radius:      10px;
      --radius-sm:   6px;
    }
    [data-theme="light"] {
      --bg:          #f2f0e8;
      --surface:     #e8e5dc;
      --surface2:    #dedad0;
      --border:      #ccc9be;
      --border2:     #b8b5aa;
      --text:        #1a1a1a;
      --muted:       #888880;
      --muted2:      #c0bdb5;
      --accent:      #3a5c00;
      --accent-dim:  rgba(58,92,0,.1);
      --accent-glow: rgba(58,92,0,.04);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      transition: background .25s, color .25s;
      overflow-x: hidden;
    }

    /* ───── HEADER ───── */
    header {
      position: sticky; top:0; z-index:200;
      height: 58px;
      display: flex; align-items:center; justify-content:space-between;
      padding: 0 28px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 26px;
      letter-spacing: 4px;
      user-select: none;
    }
    .logo-trap   { color: var(--accent); }
    .logo-finder { color: var(--text); }
    #themeBtn {
      width:38px; height:38px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display:flex; align-items:center; justify-content:center;
      font-size:17px;
      transition: border-color .2s, background .2s;
    }
    #themeBtn:hover { border-color: var(--accent); background: var(--accent-glow); }

    /* ───── MAIN ───── */
    main { max-width:1080px; margin:0 auto; padding:36px 28px 80px; }

    /* ───── HERO ───── */
    .hero { margin-bottom:36px; }
    .hero-headline {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(56px, 10vw, 108px);
      line-height:.88;
      letter-spacing: 3px;
      margin-bottom:14px;
    }
    .hero-headline em { font-style:normal; color:var(--accent); }
    .hero-sub {
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
      max-width:480px;
      font-weight:300;
    }
    .hero-sub strong { color:var(--text); font-weight:500; }

    /* ───── STATS BAR ───── */
    .stats-bar {
      display:flex; flex-wrap:wrap;
      margin-bottom:22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow:hidden;
    }
    .stat-item {
      flex:1; min-width:90px;
      padding: 14px 20px;
      border-right: 1px solid var(--border);
      display:flex; flex-direction:column; gap:3px;
    }
    .stat-item:last-child { border-right:none; }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px; font-weight:700;
      color: var(--accent);
    }
    .stat-label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }

    /* ───── PROGRESS ───── */
    #progressWrap {
      width:100%; height:3px;
      background:var(--border); border-radius:2px;
      overflow:hidden; margin-bottom:20px; display:none;
    }
    #progressWrap.on { display:block; }
    #progressBar {
      height:100%; width:0%;
      background:var(--accent); border-radius:2px;
      transition:width .08s linear;
    }

    /* ───── FILTERS ───── */
    .filters-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom:20px;
    }
    .filters-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px 12px;
      border-bottom:1px solid var(--border);
      cursor:pointer; user-select:none;
    }
    .filters-head-left { display:flex; align-items:center; gap:10px; }
    .filters-title { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); font-weight:500; }
    .filters-dot {
      width:6px; height:6px;
      background:var(--accent); border-radius:50%; display:none;
    }
    .filters-dot.on { display:block; }
    .filters-chevron { color:var(--muted); font-size:12px; transition:transform .2s; }
    .filters-wrap.collapsed .filters-chevron { transform:rotate(-90deg); }
    .filters-body { padding:16px 18px 18px; }
    .filters-wrap.collapsed .filters-body { display:none; }
    .filters-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap:14px;
    }
    .filter-group { display:flex; flex-direction:column; gap:6px; }
    .filter-label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
    .filter-range { display:flex; align-items:center; gap:6px; }
    .filter-range-sep { color:var(--muted2); font-size:13px; }

    input[type="number"], input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      outline: none; width:100%;
      transition: border-color .15s;
      -moz-appearance:textfield;
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; }
    input:focus { border-color:var(--accent); }
    input::placeholder { color:var(--muted); }
    .filter-range input[type="number"] { width:68px; flex-shrink:0; }

    .filters-actions { display:flex; justify-content:flex-end; margin-top:14px; }
    .btn-ghost {
      background:none; border:1px solid var(--border2);
      color:var(--muted); cursor:pointer;
      font-size:11px; letter-spacing:1px; text-transform:uppercase;
      padding:5px 12px; border-radius:var(--radius-sm);
      font-family:'DM Sans',sans-serif; transition:all .15s;
    }
    .btn-ghost:hover { color:var(--text); border-color:var(--text); }

    /* ───── TOOLBAR ───── */
    .toolbar { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .toolbar-label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
    .sort-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor:pointer; font-size:12px;
      padding:5px 12px; border-radius:20px;
      font-family:'DM Sans',sans-serif; transition: all .15s; white-space:nowrap;
    }
    .sort-btn:hover { color:var(--text); }
    .sort-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

    .results-info { font-size:12px; color:var(--muted); margin-bottom:10px; }
    .results-info b { color:var(--text); font-family:'JetBrains Mono',monospace; font-weight:600; }

    /* ───── TRAP CARDS ───── */
    .trap-list { display:flex; flex-direction:column; gap:5px; }

    .trap-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor:pointer;
      transition: border-color .15s, background .15s, transform .1s;
      user-select:none;
    }
    .trap-card:hover { border-color:var(--border2); background:var(--surface2); transform:translateX(3px); }
    .trap-card:active { transform:translateX(1px) scale(.997); }

    .trap-row { display:flex; align-items:center; padding:13px 16px; gap:14px; }
    .trap-ending {
      font-family:'JetBrains Mono',monospace;
      font-size:18px; font-weight:700;
      color:var(--accent); min-width:110px;
    }
    .trap-ending .dash { color:var(--muted); font-weight:400; }
    .trap-tags { display:flex; gap:7px; flex:1; flex-wrap:wrap; align-items:center; }
    .tag {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:20px; padding:2px 9px;
      font-size:11px; color:var(--muted);
      font-family:'JetBrains Mono',monospace; white-space:nowrap;
    }
    .tag b { color:var(--text); }
    .trap-cta {
      flex-shrink:0; font-size:11px; color:var(--muted);
      display:flex; align-items:center; gap:5px; margin-left:auto;
    }

    /* ───── LOADING / EMPTY ───── */
    .loading { text-align:center; padding:70px 20px; color:var(--muted); }
    .spinner {
      width:30px; height:30px;
      border:2px solid var(--border2); border-top-color:var(--accent);
      border-radius:50%; animation:spin .6s linear infinite;
      margin:0 auto 14px;
    }
    @keyframes spin { to{ transform:rotate(360deg); } }
    .loading p { font-size:13px; }
    .empty { text-align:center; padding:70px 20px; }
    .empty-title { font-family:'Bebas Neue',cursive; font-size:40px; letter-spacing:3px; color:var(--border2); margin-bottom:8px; }
    .empty p { color:var(--muted); font-size:13px; }

    /* ════════════════════════════════════════
       MODAL
    ════════════════════════════════════════ */
    .backdrop {
      position:fixed; inset:0; z-index:900;
      background:rgba(0,0,0,.75);
      backdrop-filter:blur(5px);
      display:flex; align-items:center; justify-content:center;
      padding:20px;
      opacity:0; pointer-events:none;
      transition:opacity .18s;
    }
    .backdrop.open { opacity:1; pointer-events:all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width:100%; max-width:540px;
      max-height:88vh;
      display:flex; flex-direction:column;
      transform:translateY(20px) scale(.96);
      transition:transform .22s cubic-bezier(.22,1,.36,1);
      overflow:hidden;
    }
    .backdrop.open .modal { transform:translateY(0) scale(1); }

    /* Modal header */
    .modal-hd {
      display:flex; align-items:flex-start; justify-content:space-between;
      padding:22px 22px 0; flex-shrink:0;
    }
    .modal-label { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:6px; }
    .modal-ending {
      font-family:'Bebas Neue',cursive;
      font-size:54px; line-height:1; letter-spacing:2px;
      color:var(--accent);
    }
    .modal-ending .dash { color:var(--muted); }
    .modal-close-btn {
      background:none; border:1px solid var(--border2);
      color:var(--muted); cursor:pointer;
      width:32px; height:32px;
      border-radius:var(--radius-sm);
      font-size:15px; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; margin-top:4px; transition:all .15s;
    }
    .modal-close-btn:hover { color:var(--text); border-color:var(--text); }

    /* Stats strip */
    .modal-stats {
      display:flex; flex-wrap:wrap;
      margin:18px 22px 0;
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      overflow:hidden; flex-shrink:0;
    }
    .mstat {
      flex:1; min-width:70px; padding:10px 14px;
      border-right:1px solid var(--border);
      display:flex; flex-direction:column; gap:2px;
    }
    .mstat:last-child { border-right:none; }
    .mstat-val { font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:700; color:var(--accent); }
    .mstat-lbl { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }

    /* Preview */
    .modal-preview { padding:18px 22px 0; flex-shrink:0; }
    .modal-section-label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:10px; }
    .chips-row { display:flex; flex-wrap:wrap; gap:6px; }

    .chip {
      background:var(--bg); border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:5px 11px;
      font-family:'JetBrains Mono',monospace; font-size:13px;
    }
    .chip .stem { color:var(--text); }
    .chip .end  { color:var(--accent); font-weight:700; }

    .chip-more {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:5px 11px;
      font-size:12px; color:var(--muted); font-family:'DM Sans',sans-serif;
      display:flex; align-items:center;
    }

    /* View solves button */
    .modal-actions { padding:16px 22px 0; flex-shrink:0; }
    .btn-primary {
      width:100%;
      background:var(--accent-dim); border:1px solid var(--accent);
      color:var(--accent);
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
      letter-spacing:.5px; padding:11px 0;
      border-radius:var(--radius-sm); cursor:pointer;
      transition:all .15s;
    }
    .btn-primary:hover { background:var(--accent); color:var(--bg); }

    /* Solves grid (scrollable) */
    .modal-solves {
      display:none; flex-direction:column;
      overflow:hidden; flex:1; min-height:0;
    }
    .modal-solves.open { display:flex; }
    .modal-solves-hd {
      padding:18px 22px 10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
    }
    .solves-count { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); }
    .solves-grid {
      overflow-y:auto; padding:0 22px 22px;
      display:flex; flex-wrap:wrap; gap:6px;
    }
    .solves-grid::-webkit-scrollbar { width:4px; }
    .solves-grid::-webkit-scrollbar-track { background:transparent; }
    .solves-grid::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

    .modal-spacer { height:22px; flex-shrink:0; }

    /* ───── RESPONSIVE ───── */
    @media (max-width:620px) {
      header { padding:0 16px; }
      main   { padding:24px 16px 60px; }
      .hero-headline { font-size:52px; }
      .trap-ending { font-size:15px; min-width:80px; }
      .trap-row { padding:11px 12px; gap:10px; }
      .filters-grid { grid-template-columns:1fr 1fr; }
      .stat-item { padding:12px 14px; }
      .stat-value { font-size:17px; }
      .sort-btn { font-size:11px; padding:4px 10px; }
      .trap-cta span { display:none; }
      .modal-ending { font-size:40px; }
      .modal-hd { padding:18px 16px 0; }
      .modal-stats { margin:14px 16px 0; }
      .modal-preview { padding:14px 16px 0; }
      .modal-actions { padding:12px 16px 0; }
      .modal-solves-hd { padding:14px 16px 8px; }
      .solves-grid { padding:0 16px 18px; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="logo">
    <span class="logo-trap">TRAP</span><span class="logo-finder">FINDER</span>
  </div>
  <button id="themeBtn" aria-label="Toggle theme">🌙</button>
</header>

<!-- ═══ MAIN ═══ -->
<main>

  <div class="hero">
    <h1 class="hero-headline">FIND<br>THE <em>TRAPS</em></h1>
    <p class="hero-sub">
      Word endings that are <strong>tricky to solve</strong>.
      Click any trap to preview solves and reveal the full list.
    </p>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-value" id="sWords">—</div><div class="stat-label">Words loaded</div></div>
    <div class="stat-item"><div class="stat-value" id="sTraps">—</div><div class="stat-label">Total traps</div></div>
    <div class="stat-item"><div class="stat-value" id="sShowing">—</div><div class="stat-label">Showing</div></div>
  </div>

  <div id="progressWrap"><div id="progressBar"></div></div>

  <!-- Filters -->
  <div class="filters-wrap" id="filtersWrap">
    <div class="filters-head" id="filtersHead">
      <div class="filters-head-left">
        <span class="filters-title">Filters &amp; Search</span>
        <div class="filters-dot" id="filtersDot"></div>
      </div>
      <span class="filters-chevron">▾</span>
    </div>
    <div class="filters-body">
      <div class="filters-grid">
        <div class="filter-group" style="grid-column:span 2;">
          <label class="filter-label">Search trap ending</label>
          <input type="text" id="fSearch" placeholder="e.g. ough, ez, tion, ize…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="filter-group">
          <label class="filter-label">Trap length</label>
          <div class="filter-range">
            <input type="number" id="fTrapMin" placeholder="min" min="2" max="8" />
            <span class="filter-range-sep">–</span>
            <input type="number" id="fTrapMax" placeholder="max" min="2" max="8" />
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Solves count (max 100)</label>
          <div class="filter-range">
            <input type="number" id="fSolvMin" placeholder="min" min="2" max="100" value="3" />
            <span class="filter-range-sep">–</span>
            <input type="number" id="fSolvMax" placeholder="max" min="2" max="100" value="100" />
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Word length</label>
          <div class="filter-range">
            <input type="number" id="fWordMin" placeholder="min" min="3" />
            <span class="filter-range-sep">–</span>
            <input type="number" id="fWordMax" placeholder="max" />
          </div>
        </div>
      </div>
      <div class="filters-actions">
        <button class="btn-ghost" id="resetBtn">Reset filters</button>
      </div>
    </div>
  </div>

  <!-- Sort -->
  <div class="toolbar">
    <span class="toolbar-label">Sort:</span>
    <button class="sort-btn active" data-sort="solves-desc">Most solves</button>
    <button class="sort-btn" data-sort="solves-asc">Fewest solves</button>
    <button class="sort-btn" data-sort="len-desc">Longest trap</button>
    <button class="sort-btn" data-sort="len-asc">Shortest trap</button>
    <button class="sort-btn" data-sort="alpha">A – Z</button>
  </div>

  <p class="results-info" id="resultsInfo"></p>
  <div class="trap-list" id="trapList">
    <div class="loading"><div class="spinner"></div><p>Loading dictionary…</p></div>
  </div>

</main>

<!-- ═══ MODAL ═══ -->
<div class="backdrop" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="mEndingText">

  <div class="modal" id="modal">

    <div class="modal-hd">
      <div>
        <div class="modal-label">Trap ending</div>
        <div class="modal-ending"><span class="dash">—</span><span id="mEndingText"></span></div>
      </div>
      <button class="modal-close-btn" id="modalClose" aria-label="Close">✕</button>
    </div>

    <div class="modal-stats">
      <div class="mstat"><div class="mstat-val" id="mSolves">—</div><div class="mstat-lbl">Solves</div></div>
      <div class="mstat"><div class="mstat-val" id="mTrapLen">—</div><div class="mstat-lbl">Trap len</div></div>
      <div class="mstat"><div class="mstat-val" id="mWordRange">—</div><div class="mstat-lbl">Word lengths</div></div>
    </div>

    <div class="modal-preview">
      <div class="modal-section-label">Preview solves</div>
      <div class="chips-row" id="mPreview"></div>
    </div>

    <div class="modal-actions" id="mActionsWrap">
      <button class="btn-primary" id="btnViewSolves">View all solves ↓</button>
    </div>

    <div class="modal-solves" id="mSolves">
      <div class="modal-solves-hd">
        <span class="modal-section-label">All solves</span>
        <span class="solves-count" id="mSolvesCount"></span>
      </div>
      <div class="solves-grid" id="mSolvesGrid"></div>
    </div>

    <div class="modal-spacer"></div>
  </div>

</div>

<script>
/* ─── CONFIG ─── */
const DICT_URL   = 'https://raw.githubusercontent.com/iamdookie1/Dictionary/refs/heads/main/Dict';
const MAX_RENDER = 300;
const MIN_END    = 2;
const MAX_END    = 8;
const PREVIEW_N  = 5;
const CHUNK      = 600;   // words per tick – tunes lag
const MAX_SOLVES = 100;   // hard cap enforced everywhere

/* ─── STATE ─── */
let allWords = [];
let allTraps = [];
let sortKey  = 'solves-desc';
let isDark   = true;
let currentTrap = null;

/* ─── THEME ─── */
const themeBtn = document.getElementById('themeBtn');
themeBtn.addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  themeBtn.textContent = isDark ? '🌙' : '☀️';
});

/* ─── FILTERS COLLAPSIBLE ─── */
document.getElementById('filtersHead').addEventListener('click', () =>
  document.getElementById('filtersWrap').classList.toggle('collapsed')
);

/* ─── CLAMP SOLVES INPUTS ─── */
['fSolvMin','fSolvMax'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    const el = document.getElementById(id);
    let v = parseInt(el.value);
    if (isNaN(v)) return;
    if (v < 2)   el.value = 2;
    if (v > 100) el.value = 100;
  });
});

/* ─── LOAD WORDS ─── */
async function loadWords() {
  try {
    const res  = await fetch(DICT_URL);
    const text = await res.text();
    allWords = text.split('\n')
      .map(w => w.trim().toLowerCase().replace(/[^a-z]/g,''))
      .filter(w => w.length >= 3);
    document.getElementById('sWords').textContent = allWords.length.toLocaleString();
    computeAsync();
  } catch {
    document.getElementById('trapList').innerHTML =
      `<div class="empty"><div class="empty-title">Load Failed</div><p>Could not fetch the dictionary.</p></div>`;
  }
}

/* ─── CHUNKED TRAP COMPUTATION ─── */
function computeAsync() {
  const pw  = document.getElementById('progressWrap');
  const pb  = document.getElementById('progressBar');
  pw.classList.add('on');

  const map   = new Map();
  let   idx   = 0;
  const total = allWords.length;

  function tick() {
    const end = Math.min(idx + CHUNK, total);
    for (; idx < end; idx++) {
      const word = allWords[idx];
      const cap  = Math.min(MAX_END, Math.floor(word.length * 0.7));
      for (let len = MIN_END; len <= cap; len++) {
        if (len >= word.length) continue;
        const ending = word.slice(-len);
        if (!map.has(ending)) map.set(ending, new Set());
        map.get(ending).add(word);
      }
    }
    pb.style.width = ((idx / total) * 100) + '%';

    if (idx < total) {
      requestAnimationFrame(tick);
    } else {
      allTraps = [];
      for (const [ending, wordSet] of map) {
        if (wordSet.size < 2)             continue;
        if (/^(.)\1+$/.test(ending))      continue;  // skip "aaa"
        if (wordSet.size > MAX_SOLVES)    continue;  // cap at 100 — eliminates "s","e",etc
        allTraps.push({ ending, words: Array.from(wordSet).sort() });
      }
      pw.classList.remove('on');
      document.getElementById('sTraps').textContent = allTraps.length.toLocaleString();
      render();
    }
  }
  requestAnimationFrame(tick);
}

/* ─── FILTERS ─── */
function getFilters() {
  const n = id => { const v = parseInt(document.getElementById(id).value); return isNaN(v) ? null : v; };
  const solvMax = n('fSolvMax');
  return {
    search:  document.getElementById('fSearch').value.trim().toLowerCase(),
    trapMin: n('fTrapMin'),
    trapMax: n('fTrapMax'),
    solvMin: n('fSolvMin'),
    solvMax: solvMax === null ? MAX_SOLVES : Math.min(solvMax, MAX_SOLVES),
    wordMin: n('fWordMin'),
    wordMax: n('fWordMax'),
  };
}

function filterTraps(traps, f) {
  return traps.reduce((acc, t) => {
    if (f.search && !t.ending.includes(f.search)) return acc;
    if (f.trapMin && t.ending.length < f.trapMin) return acc;
    if (f.trapMax && t.ending.length > f.trapMax) return acc;

    let words = t.words;
    if (f.wordMin || f.wordMax) {
      words = words.filter(w =>
        (!f.wordMin || w.length >= f.wordMin) &&
        (!f.wordMax || w.length <= f.wordMax)
      );
    }
    const n = words.length;
    if (n < 2)          return acc;
    if (f.solvMin && n < f.solvMin) return acc;
    if (n > f.solvMax)  return acc;
    acc.push({ ...t, words });
    return acc;
  }, []);
}

function sortTraps(traps) {
  return [...traps].sort((a, b) => {
    if (sortKey === 'solves-desc') return b.words.length - a.words.length;
    if (sortKey === 'solves-asc')  return a.words.length - b.words.length;
    if (sortKey === 'len-desc')    return b.ending.length - a.ending.length;
    if (sortKey === 'len-asc')     return a.ending.length - b.ending.length;
    if (sortKey === 'alpha')       return a.ending.localeCompare(b.ending);
    return 0;
  });
}

/* ─── RENDER ─── */
function render() {
  const f       = getFilters();
  const active  = !!(f.search || f.trapMin || f.trapMax ||
                     (f.solvMin && f.solvMin > 2) || f.solvMax < MAX_SOLVES ||
                     f.wordMin || f.wordMax);
  document.getElementById('filtersDot').classList.toggle('on', active);

  const filtered = filterTraps(allTraps, f);
  const sorted   = sortTraps(filtered);
  const total    = sorted.length;
  const slice    = sorted.slice(0, MAX_RENDER);

  document.getElementById('sShowing').textContent = total.toLocaleString();
  document.getElementById('resultsInfo').innerHTML =
    `Showing <b>${slice.length.toLocaleString()}</b> of <b>${total.toLocaleString()}</b> traps` +
    (total > MAX_RENDER ? ' — refine filters to see more' : '');

  const listEl = document.getElementById('trapList');
  if (!slice.length) {
    listEl.innerHTML = `<div class="empty"><div class="empty-title">NO TRAPS</div><p>Try adjusting your filters.</p></div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  for (const trap of slice) {
    const wLens = trap.words.map(w => w.length);
    const wMin  = Math.min(...wLens);
    const wMax  = Math.max(...wLens);

    const card = document.createElement('div');
    card.className = 'trap-card';
    card.innerHTML = `
      <div class="trap-row">
        <div class="trap-ending"><span class="dash">—</span>${esc(trap.ending)}</div>
        <div class="trap-tags">
          <span class="tag"><b>${trap.words.length}</b> solves</span>
          <span class="tag">len <b>${trap.ending.length}</b></span>
          <span class="tag">words <b>${wMin}</b>–<b>${wMax}</b></span>
        </div>
        <div class="trap-cta"><span>view</span> ↗</div>
      </div>`;
    card.addEventListener('click', () => openModal(trap));
    frag.appendChild(card);
  }
  listEl.innerHTML = '';
  listEl.appendChild(frag);
}

/* ─── MODAL ─── */
function openModal(trap) {
  currentTrap = trap;
  const { ending, words } = trap;
  const wLens = words.map(w => w.length);

  document.getElementById('mEndingText').textContent  = ending;
  document.getElementById('mSolves').textContent      = words.length;
  document.getElementById('mTrapLen').textContent     = ending.length;
  document.getElementById('mWordRange').textContent   = Math.min(...wLens) + '–' + Math.max(...wLens);

  // Preview: random sample of PREVIEW_N words
  const sample = sample5(words, PREVIEW_N);
  const previewEl = document.getElementById('mPreview');
  let html = sample.map(w => chipHTML(w, ending)).join('');
  if (words.length > PREVIEW_N) {
    html += `<div class="chip-more">+${words.length - PREVIEW_N} more…</div>`;
  }
  previewEl.innerHTML = html;

  // Reset state
  document.getElementById('mSolves2') && (document.getElementById('mSolves2').textContent = '');
  document.getElementById('mSolvesGrid').innerHTML = '';
  document.getElementById('mSolvesCount').textContent = '';
  document.getElementById('mSolves').closest('.modal-solves') &&
    document.getElementById('mSolves').closest('.modal-solves').classList.remove('open');

  const solvesSection = document.getElementById('mSolves');
  solvesSection.classList.remove('open');
  document.getElementById('mActionsWrap').style.display = '';

  document.getElementById('backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('backdrop').classList.remove('open');
  document.body.style.overflow = '';
  currentTrap = null;
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('backdrop')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('btnViewSolves').addEventListener('click', () => {
  if (!currentTrap) return;
  const { ending, words } = currentTrap;
  const grid = document.getElementById('mSolvesGrid');
  grid.innerHTML = words.map(w => chipHTML(w, ending)).join('');
  document.getElementById('mSolvesCount').textContent = words.length + ' words';
  document.getElementById('mSolves').classList.add('open');
  document.getElementById('mActionsWrap').style.display = 'none';
  grid.scrollTop = 0;
});

/* ─── HELPERS ─── */
function chipHTML(word, ending) {
  const stem = word.slice(0, -ending.length);
  return `<div class="chip"><span class="stem">${esc(stem)}</span><span class="end">${esc(ending)}</span></div>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sample5(arr, n) {
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy.slice(0, n);
}

/* ─── EVENTS ─── */
document.querySelectorAll('.sort-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortKey = btn.dataset.sort;
    render();
  })
);

let timer;
function schedule() { clearTimeout(timer); timer = setTimeout(render, 180); }
['fSearch','fTrapMin','fTrapMax','fSolvMin','fSolvMax','fWordMin','fWordMax']
  .forEach(id => document.getElementById(id).addEventListener('input', schedule));

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('fSearch').value  = '';
  document.getElementById('fTrapMin').value = '';
  document.getElementById('fTrapMax').value = '';
  document.getElementById('fSolvMin').value = '3';
  document.getElementById('fSolvMax').value = '100';
  document.getElementById('fWordMin').value = '';
  document.getElementById('fWordMax').value = '';
  render();
});

/* ─── INIT ─── */
loadWords();
</script>
