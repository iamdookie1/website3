<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lexicon</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300;1,500&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --sidebar-w: 220px;
  --font-head: 'Fraunces', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'Inter', sans-serif;
  --radius-sm: 5px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --accent: #1D9E75;
  --accent-rgb: 29,158,117;
  --bg-primary: #111110;
  --bg-secondary: #191918;
  --bg-tertiary: #141413;
  --text-primary: #EEECEA;
  --text-secondary: #888580;
  --border-light: rgba(255,255,255,0.07);
  --border-mid: rgba(255,255,255,0.13);
}
[data-theme="light"] {
  --bg-primary: #FFFFFF;
  --bg-secondary: #F6F5F3;
  --bg-tertiary: #EFEDE9;
  --text-primary: #1A1917;
  --text-secondary: #706E69;
  --border-light: rgba(0,0,0,0.07);
  --border-mid: rgba(0,0,0,0.13);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  transition: background 0.2s, color 0.2s;
}
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg-primary);
  border-right: 0.5px solid var(--border-light);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  transition: width 0.25s ease;
  overflow: hidden;
  z-index: 100;
}
#sidebar.collapsed { width: 0; }

.sidebar-header {
  padding: 18px 16px 14px;
  border-bottom: 0.5px solid var(--border-light);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: white;
  font-family: var(--font-head);
  font-size: 15px; font-style: italic;
}
.logo-text {
  font-family: var(--font-head);
  font-size: 19px; font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.5px;
  white-space: nowrap;
}
.logo-text em { font-style: italic; font-weight: 300; color: var(--accent); }

.sidebar-nav {
  padding: 10px 8px;
  display: flex; flex-direction: column; gap: 3px;
  flex-shrink: 0;
}
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-md);
  border: none; background: transparent;
  cursor: pointer;
  font-size: 13.5px; font-weight: 400;
  color: var(--text-secondary);
  text-align: left; white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  font-family: var(--font-body);
  width: 100%;
}
.nav-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
.nav-btn.active {
  background: rgba(var(--accent-rgb),0.12);
  color: var(--accent);
  font-weight: 500;
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

.sidebar-footer { margin-top: auto; padding: 10px 10px 14px; flex-shrink: 0; }
.stat-box {
  padding: 12px 14px;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  font-size: 12px; color: var(--text-secondary);
  white-space: nowrap;
}
.stat-box strong {
  display: block;
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 500;
  color: var(--accent);
  margin-bottom: 2px; letter-spacing: -1px;
}
.theme-toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 2px 0;
  font-size: 12px; color: var(--text-secondary);
}
.theme-switch { position: relative; width: 36px; height: 20px; }
.theme-switch input { opacity: 0; width: 0; height: 0; }
.slider-track {
  position: absolute; inset: 0;
  background: var(--border-mid);
  border-radius: 999px; cursor: pointer;
  transition: background 0.2s;
}
.slider-track::before {
  content: ''; position: absolute;
  width: 14px; height: 14px;
  background: white; border-radius: 50%;
  left: 3px; top: 3px;
  transition: transform 0.2s;
}
.theme-switch input:checked + .slider-track { background: var(--accent); }
.theme-switch input:checked + .slider-track::before { transform: translateX(16px); }

/* ── TOGGLE BTN ── */
#toggle-btn {
  position: fixed; top: 14px; left: 14px; z-index: 200;
  background: var(--bg-primary);
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  width: 34px; height: 34px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); font-size: 16px;
  transition: background 0.15s;
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
}
#toggle-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

/* ── MAIN CONTENT ── */
#main-content {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
  min-width: 0;
}

/* ── PANELS ── */
#main-panel {
  display: flex; flex-direction: column;
  flex: 1; overflow: hidden; min-height: 0;
}
#main-panel.hidden { display: none; }

#settings-panel {
  display: none;
  flex-direction: column;
  flex: 1; overflow: hidden;
}
#settings-panel.active { display: flex; }

/* ── TOPBAR ── */
.topbar {
  padding: 11px 16px 11px 58px;
  border-bottom: 0.5px solid var(--border-light);
  background: var(--bg-primary);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.topbar-title {
  font-family: var(--font-head);
  font-size: 17px; font-weight: 500;
  color: var(--text-primary);
  margin-right: 4px; white-space: nowrap;
}
.match-badge {
  display: none;
  background: rgba(var(--accent-rgb),0.12);
  color: var(--accent);
  font-size: 11px; padding: 3px 9px;
  border-radius: 999px;
  font-family: var(--font-mono);
  white-space: nowrap;
}
.match-badge.visible { display: inline-block; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.sort-select {
  padding: 6px 10px; font-size: 12px;
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  background: var(--bg-secondary);
  color: var(--text-primary);
  outline: none; font-family: var(--font-body); cursor: pointer;
  transition: border-color 0.15s;
}
.sort-select:focus { border-color: var(--accent); }
.sort-select option { background: var(--bg-primary); }

/* ── WORDS AREA ── */
.page-body {
  flex: 1; overflow-y: auto;
  padding: 14px 16px; min-height: 0;
}
.words-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 6px;
}
.word-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 9px 12px;
  font-family: var(--font-mono);
  font-size: 12px; color: var(--text-primary);
  word-break: break-all;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
  cursor: pointer; user-select: none;
  animation: cardIn 0.12s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}
.word-card:hover {
  border-color: var(--accent);
  background: rgba(var(--accent-rgb),0.09);
  color: var(--accent);
}
.word-len {
  font-family: var(--font-body);
  font-size: 10px; color: var(--text-secondary);
  margin-top: 3px; opacity: 0.7;
}

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 10px;
  color: var(--text-secondary);
  pointer-events: none;
}
.empty-icon {
  font-family: var(--font-head);
  font-size: 48px; opacity: 0.15;
  font-style: italic;
}
.empty-state p { font-size: 13.5px; }
.empty-state small { font-size: 12px; opacity: 0.55; }

.loading-wrap {
  display: flex; align-items: center;
  justify-content: center; height: 100%; gap: 8px;
  color: var(--text-secondary); font-size: 13px;
}
.loading-dots { display: flex; gap: 5px; }
.loading-dots span {
  width: 5px; height: 5px; background: var(--accent);
  border-radius: 50%;
  animation: dp 1.1s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: .18s; }
.loading-dots span:nth-child(3) { animation-delay: .36s; }
@keyframes dp {
  0%,80%,100% { opacity: 0.2; transform: scale(0.75); }
  40%          { opacity: 1;   transform: scale(1); }
}

/* ── PAGINATION ── */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; padding: 10px 16px;
  border-top: 0.5px solid var(--border-light);
  background: var(--bg-primary);
  flex-shrink: 0; flex-wrap: wrap;
}
.pg-btn {
  padding: 5px 11px; font-size: 12.5px;
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  background: transparent; color: var(--text-primary);
  cursor: pointer; font-family: var(--font-body);
  transition: background 0.15s; min-width: 32px;
}
.pg-btn:hover:not(:disabled) { background: var(--bg-secondary); }
.pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.pg-btn.active {
  background: var(--accent); color: white;
  border-color: var(--accent); font-weight: 500;
}
.pg-info { font-size: 11.5px; color: var(--text-secondary); font-family: var(--font-mono); padding: 0 4px; }
.pg-ellipsis { color: var(--text-secondary); padding: 0 2px; font-size: 13px; }

/* ── FILTER DOCK ── */
#filter-dock {
  flex-shrink: 0;
  border-top: 0.5px solid var(--border-light);
  background: var(--bg-primary);
}

.dock-brand-bar {
  padding: 10px 16px 9px 58px;
  border-bottom: 0.5px solid var(--border-light);
  display: flex; align-items: center; gap: 12px;
}
.dock-logo {
  font-family: var(--font-head);
  font-size: 17px; font-weight: 500;
  color: var(--text-primary); letter-spacing: -0.3px;
  white-space: nowrap; line-height: 1;
}
.dock-logo em { font-style: italic; color: var(--accent); font-weight: 300; }
.dock-status {
  font-size: 11.5px; color: var(--text-secondary);
  font-family: var(--font-mono);
}

.dock-filters-wrap { padding: 10px 16px 12px; }

.dock-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center;
}
.dock-row + .dock-row {
  margin-top: 7px;
  padding-top: 7px;
  border-top: 0.5px solid var(--border-light);
}

.filter-label {
  font-size: 11px; color: var(--text-secondary);
  white-space: nowrap; flex-shrink: 0;
}

.dock-input {
  padding: 6px 9px; font-size: 12.5px;
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  background: var(--bg-secondary);
  color: var(--text-primary);
  outline: none; font-family: var(--font-mono);
  transition: border-color 0.15s, background 0.15s;
}
.dock-input:focus { border-color: var(--accent); background: var(--bg-tertiary); }
.dock-input::placeholder { color: var(--text-secondary); font-family: var(--font-body); font-size: 12px; }
.dock-input.w-starts  { width: 130px; }
.dock-input.w-ends    { width: 130px; }
.dock-input.w-contains { width: 120px; }
.dock-input.w-excl    { width: 120px; }
.dock-input.w-regex   { width: 170px; }
.dock-input.w-has     { width: 155px; }
.dock-input.w-only    { width: 155px; }
.dock-input.w-num     { width: 62px; text-align: center; }
.dock-input.w-char    { width: 46px; text-align: center; }

.dock-sep { width: 1px; height: 20px; background: var(--border-mid); flex-shrink: 0; }

.t-chip {
  padding: 5px 11px; font-size: 12px;
  border: 0.5px solid var(--border-mid);
  border-radius: 999px; background: transparent;
  color: var(--text-secondary); cursor: pointer;
  font-family: var(--font-body);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  white-space: nowrap; user-select: none;
}
.t-chip:hover { background: var(--bg-secondary); color: var(--text-primary); }
.t-chip.on {
  background: rgba(var(--accent-rgb),0.12);
  color: var(--accent);
  border-color: var(--accent);
}

.dock-search-btn {
  padding: 6px 18px; font-size: 12.5px;
  border: none; border-radius: var(--radius-md);
  background: var(--accent); color: white;
  cursor: pointer; font-family: var(--font-body);
  font-weight: 500;
  transition: opacity 0.15s, transform 0.1s;
  white-space: nowrap; flex-shrink: 0;
}
.dock-search-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.dock-search-btn:active { transform: none; }

.dock-clear-btn {
  padding: 6px 13px; font-size: 12.5px;
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  background: transparent; color: var(--text-secondary);
  cursor: pointer; font-family: var(--font-body);
  transition: background 0.15s, color 0.15s;
  white-space: nowrap; flex-shrink: 0;
}
.dock-clear-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

/* ── SETTINGS ── */
.settings-topbar {
  padding: 11px 16px 11px 58px;
  border-bottom: 0.5px solid var(--border-light);
  background: var(--bg-primary); flex-shrink: 0;
}
.settings-topbar h2 {
  font-family: var(--font-head);
  font-size: 17px; font-weight: 500;
  color: var(--text-primary);
}

.settings-body { overflow-y: auto; flex: 1; padding: 20px; }
.settings-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; max-width: 840px;
}
@media (max-width: 640px) { .settings-grid { grid-template-columns: 1fr; } }

.settings-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
}
.settings-card h3 {
  font-family: var(--font-head);
  font-size: 14px; font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 0.5px solid var(--border-light);
}
.setting-row {
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
  margin-bottom: 12px;
}
.setting-row:last-child { margin-bottom: 0; }
.setting-label { font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }

.swatch-row { display: flex; gap: 7px; flex-wrap: wrap; }
.swatch {
  width: 24px; height: 24px; border-radius: 50%;
  cursor: pointer; border: 2.5px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
}
.swatch:hover { transform: scale(1.2); }
.swatch.selected { border-color: var(--text-primary); }

.tog-row { display: flex; gap: 5px; flex-wrap: wrap; }
.tog {
  padding: 5px 12px; font-size: 12px;
  border: 0.5px solid var(--border-mid);
  border-radius: 999px; background: transparent;
  color: var(--text-secondary); cursor: pointer;
  font-family: var(--font-body);
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.tog:hover { background: var(--bg-secondary); color: var(--text-primary); }
.tog.active { background: var(--accent); color: white; border-color: var(--accent); }

.range-row { display: flex; align-items: center; gap: 10px; flex: 1; }
.range-row input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
.range-val { font-family: var(--font-mono); font-size: 12px; min-width: 36px; color: var(--text-primary); text-align: right; }

/* ── MODAL ── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 999;
  align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}
#modal-overlay.open { display: flex; animation: mFadeIn 0.15s ease; }
@keyframes mFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes mSlideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

#modal-box {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 360px;
  overflow: hidden;
  animation: mSlideUp 0.18s ease;
  box-shadow: 0 8px 40px rgba(0,0,0,0.28);
}
.modal-header {
  padding: 18px 18px 14px;
  border-bottom: 0.5px solid var(--border-light);
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 12px;
}
.modal-word {
  font-family: var(--font-mono); font-size: 20px; font-weight: 500;
  color: var(--text-primary); word-break: break-all; line-height: 1.3;
}
.modal-close {
  background: none; border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-sm);
  width: 26px; height: 26px; cursor: pointer;
  color: var(--text-secondary); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s;
}
.modal-close:hover { background: var(--bg-secondary); color: var(--text-primary); }

.modal-meta {
  padding: 12px 18px;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; border-bottom: 0.5px solid var(--border-light);
}
.meta-chip { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 8px 10px; }
.meta-chip .mlabel { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.meta-chip .mval { font-family: var(--font-mono); font-size: 14px; font-weight: 500; color: var(--text-primary); }

.modal-actions { padding: 12px 18px; display: flex; flex-direction: column; gap: 6px; }
.modal-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-md);
  border: 0.5px solid var(--border-mid);
  background: transparent; color: var(--text-primary);
  cursor: pointer; font-family: var(--font-body); font-size: 13px;
  transition: background 0.15s; text-align: left; width: 100%;
}
.modal-btn:hover { background: var(--bg-secondary); }
.modal-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.modal-btn.primary:hover { opacity: 0.9; }
.btn-icon { font-size: 14px; width: 18px; text-align: center; }

/* ── TOAST ── */
#copy-toast {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--text-primary); color: var(--bg-primary);
  padding: 7px 18px; border-radius: 999px; font-size: 12.5px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 9999; white-space: nowrap;
}
#copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
</style>
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">ℓ</div>
      <div class="logo-text">Lexi<em>con</em></div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-btn active" data-panel="main">
        <span class="nav-icon">⌕</span> Search
      </button>
      <button class="nav-btn" data-panel="settings">
        <span class="nav-icon">◈</span> Settings
      </button>
    </div>
    <div class="sidebar-footer">
      <div class="stat-box">
        <strong id="word-count">—</strong>
        words in dictionary
        <div class="theme-toggle-row">
          <span>Light mode</span>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" />
            <div class="slider-track"></div>
          </label>
        </div>
      </div>
    </div>
  </nav>

  <!-- SIDEBAR TOGGLE -->
  <button id="toggle-btn" title="Toggle sidebar">☰</button>

  <!-- MAIN CONTENT -->
  <div id="main-content">

    <!-- ══ SEARCH PANEL ══ -->
    <div id="main-panel">

      <!-- topbar: title + match count + sort -->
      <div class="topbar">
        <span class="topbar-title">Results</span>
        <span class="match-badge" id="match-badge"></span>
        <div class="topbar-right">
          <select class="sort-select" id="sort-select">
            <option value="alpha">A → Z</option>
            <option value="alpha-rev">Z → A</option>
            <option value="len-asc">Shortest first</option>
            <option value="len-desc">Longest first</option>
          </select>
        </div>
      </div>

      <!-- WORD RESULTS (scrollable, takes all available space) -->
      <div class="page-body" id="page-body">
        <div class="empty-state">
          <div class="empty-icon">ℓ</div>
          <p>Use the filters below to search</p>
          <small id="initial-status">Loading dictionary…</small>
        </div>
      </div>

      <!-- pagination -->
      <div class="pagination" id="pagination" style="display:none;"></div>

      <!-- ── FILTER DOCK ── -->
      <div id="filter-dock">

        <div class="dock-brand-bar">
          <div class="dock-logo">Lexi<em>con</em></div>
          <span class="dock-status" id="dock-status">Loading…</span>
        </div>

        <div class="dock-filters-wrap">

          <!-- Row 1: starts / ends / contains / excludes / length -->
          <div class="dock-row">
            <input class="dock-input w-starts" id="f-starts"    type="text" placeholder="Starts with…" autocomplete="off" spellcheck="false" />
            <input class="dock-input w-ends"   id="f-ends"      type="text" placeholder="Ends with…"   autocomplete="off" spellcheck="false" />
            <input class="dock-input w-contains" id="f-contains" type="text" placeholder="Contains…"    autocomplete="off" spellcheck="false" />
            <input class="dock-input w-excl"   id="f-notcontains" type="text" placeholder="Excludes…"  autocomplete="off" spellcheck="false" />
            <div class="dock-sep"></div>
            <span class="filter-label">Len</span>
            <input class="dock-input w-num"    id="f-minlen"    type="number" placeholder="Min" min="0" max="100" />
            <span class="filter-label">–</span>
            <input class="dock-input w-num"    id="f-maxlen"    type="number" placeholder="Max" min="0" max="100" />
            <input class="dock-input w-num"    id="f-exactlen"  type="number" placeholder="= n"  min="1" max="100" />
          </div>

          <!-- Row 2: letter sets / regex / letter count / toggles / actions -->
          <div class="dock-row">
            <input class="dock-input w-has"    id="f-hasletters"  type="text" placeholder="Has all letters (aeiou)" autocomplete="off" spellcheck="false" />
            <input class="dock-input w-only"   id="f-onlyletters" type="text" placeholder="Only these letters"      autocomplete="off" spellcheck="false" />
            <input class="dock-input w-regex"  id="f-regex"       type="text" placeholder="Regex  e.g. ^.{5}ing$"   autocomplete="off" spellcheck="false" />
            <div class="dock-sep"></div>
            <span class="filter-label">Letter</span>
            <input class="dock-input w-char"   id="f-lchar"  type="text"   placeholder="e"  maxlength="1" autocomplete="off" spellcheck="false" />
            <span class="filter-label">×</span>
            <input class="dock-input w-num"    id="f-lcount" type="number" placeholder="n"  min="0" />
            <div class="dock-sep"></div>
            <button class="t-chip" id="tc-palindrome">Palindromes</button>
            <button class="t-chip" id="tc-doubles">Double letters</button>
            <button class="t-chip" id="tc-vowelonly">All vowels</button>
            <div class="dock-sep"></div>
            <button class="dock-search-btn" id="btn-search">Search</button>
            <button class="dock-clear-btn"  id="btn-clear">Clear</button>
          </div>

        </div>
      </div><!-- /filter-dock -->
    </div><!-- /main-panel -->

    <!-- ══ SETTINGS PANEL ══ -->
    <div id="settings-panel">
      <div class="settings-topbar"><h2>Settings</h2></div>
      <div class="settings-body">
        <div class="settings-grid">

          <div class="settings-card">
            <h3>Accent Color</h3>
            <div class="setting-row">
              <span class="setting-label">Preset</span>
              <div class="swatch-row" id="accent-swatches">
                <div class="swatch selected" data-color="#1D9E75" style="background:#1D9E75;" title="Teal"></div>
                <div class="swatch" data-color="#4A9EE0" style="background:#4A9EE0;" title="Blue"></div>
                <div class="swatch" data-color="#D96B3A" style="background:#D96B3A;" title="Orange"></div>
                <div class="swatch" data-color="#C95B5B" style="background:#C95B5B;" title="Red"></div>
                <div class="swatch" data-color="#9B6BD4" style="background:#9B6BD4;" title="Purple"></div>
                <div class="swatch" data-color="#C9A835" style="background:#C9A835;" title="Gold"></div>
                <div class="swatch" data-color="#D9629E" style="background:#D9629E;" title="Pink"></div>
              </div>
            </div>
            <div class="setting-row">
              <span class="setting-label">Custom</span>
              <input type="color" id="custom-accent-color" value="#1D9E75"
                style="width:36px;height:28px;border:none;background:none;cursor:pointer;border-radius:6px;overflow:hidden;" />
            </div>
          </div>

          <div class="settings-card">
            <h3>Theme</h3>
            <div class="setting-row">
              <span class="setting-label">Mode</span>
              <div class="tog-row" id="theme-togs">
                <button class="tog active" data-theme="dark">Dark</button>
                <button class="tog" data-theme="light">Light</button>
              </div>
            </div>
          </div>

          <div class="settings-card">
            <h3>Display</h3>
            <div class="setting-row">
              <span class="setting-label">Per page</span>
              <div class="range-row">
                <input type="range" id="rpp-slider" min="20" max="300" step="20" value="100" />
                <span class="range-val" id="rpp-val">100</span>
              </div>
            </div>
            <div class="setting-row">
              <span class="setting-label">Word font</span>
              <div class="tog-row" id="font-togs">
                <button class="tog active" data-font="'JetBrains Mono',monospace">Mono</button>
                <button class="tog" data-font="'Fraunces',serif">Serif</button>
                <button class="tog" data-font="'Inter',sans-serif">Sans</button>
              </div>
            </div>
          </div>

          <div class="settings-card">
            <h3>Word Click Action</h3>
            <div class="setting-row">
              <span class="setting-label">On click</span>
              <div class="tog-row" id="click-togs">
                <button class="tog active" data-action="modal">Detail card</button>
                <button class="tog" data-action="copy">Copy word</button>
                <button class="tog" data-action="nothing">Nothing</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div><!-- /settings-panel -->

  </div><!-- /main-content -->
</div><!-- /app -->

<!-- WORD DETAIL MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-header">
      <div class="modal-word" id="modal-word-text"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-meta">
      <div class="meta-chip">
        <div class="mlabel">Letters</div>
        <div class="mval" id="modal-len"></div>
      </div>
      <div class="meta-chip">
        <div class="mlabel">Vowels</div>
        <div class="mval" id="modal-vowels"></div>
      </div>
      <div class="meta-chip">
        <div class="mlabel">Unique</div>
        <div class="mval" id="modal-unique"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn primary" id="modal-copy">
        <span class="btn-icon">⎘</span> Copy to clipboard
      </button>
      <button class="modal-btn" id="modal-starts">
        <span class="btn-icon">→</span> Find words starting with this
      </button>
      <button class="modal-btn" id="modal-ends">
        <span class="btn-icon">←</span> Find words ending with this
      </button>
    </div>
  </div>
</div>

<div id="copy-toast">Copied!</div>

<script>
(function () {
  'use strict';

  let allWords = [];
  let filteredWords = [];
  let currentPage = 1;
  let perPage = 100;
  let resultFont = "'JetBrains Mono',monospace";
  let clickAction = 'modal';
  let activeWord = '';

  /* ── load dict ── */
  async function loadDictionary() {
    try {
      const r = await fetch('https://raw.githubusercontent.com/iamdookie1/Dictionary/refs/heads/main/Dict');
      const txt = await r.text();
      allWords = txt.split('\n').map(w => w.trim()).filter(Boolean);
      const n = allWords.length.toLocaleString();
      document.getElementById('word-count').textContent = n;
      document.getElementById('dock-status').textContent = n + ' words ready';
      document.getElementById('initial-status').textContent = n + ' words loaded — try a search';
    } catch {
      document.getElementById('dock-status').textContent = 'Failed to load';
      document.getElementById('initial-status').textContent = 'Could not load dictionary';
    }
  }
  loadDictionary();

  /* ── sidebar toggle ── */
  document.getElementById('toggle-btn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
  });

  /* ── panel nav ── */
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const p = btn.dataset.panel;
      document.getElementById('main-panel').classList.toggle('hidden', p !== 'main');
      document.getElementById('settings-panel').classList.toggle('active', p === 'settings');
    });
  });

  /* ── theme ── */
  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('theme-toggle').checked = !dark;
    document.querySelectorAll('#theme-togs .tog').forEach(t =>
      t.classList.toggle('active', t.dataset.theme === (dark ? 'dark' : 'light')));
  }
  document.getElementById('theme-toggle').addEventListener('change', function() {
    applyTheme(!this.checked);
  });
  document.querySelectorAll('#theme-togs .tog').forEach(tog => {
    tog.addEventListener('click', () => applyTheme(tog.dataset.theme === 'dark'));
  });

  /* ── accent ── */
  function hexToRgb(hex) {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '29,158,117';
  }
  function setAccent(color) {
    document.documentElement.style.setProperty('--accent', color);
    document.documentElement.style.setProperty('--accent-rgb', hexToRgb(color));
    document.getElementById('custom-accent-color').value = color;
  }
  document.querySelectorAll('#accent-swatches .swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('#accent-swatches .swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      setAccent(sw.dataset.color);
    });
  });
  document.getElementById('custom-accent-color').addEventListener('input', e => {
    setAccent(e.target.value);
    document.querySelectorAll('#accent-swatches .swatch').forEach(s => s.classList.remove('selected'));
  });

  /* ── font ── */
  document.querySelectorAll('#font-togs .tog').forEach(tog => {
    tog.addEventListener('click', () => {
      document.querySelectorAll('#font-togs .tog').forEach(t => t.classList.remove('active'));
      tog.classList.add('active');
      resultFont = tog.dataset.font;
      if (filteredWords.length > 0) renderPage();
    });
  });

  /* ── per page ── */
  const rppSlider = document.getElementById('rpp-slider');
  document.getElementById('rpp-val').textContent = rppSlider.value;
  rppSlider.addEventListener('input', () => {
    perPage = +rppSlider.value;
    document.getElementById('rpp-val').textContent = perPage;
    if (filteredWords.length > 0) { currentPage = 1; renderPage(); }
  });

  /* ── click action ── */
  document.querySelectorAll('#click-togs .tog').forEach(tog => {
    tog.addEventListener('click', () => {
      document.querySelectorAll('#click-togs .tog').forEach(t => t.classList.remove('active'));
      tog.classList.add('active');
      clickAction = tog.dataset.action;
    });
  });

  /* ── toggle chips ── */
  ['tc-palindrome','tc-doubles','tc-vowelonly'].forEach(id => {
    document.getElementById(id).addEventListener('click', function() {
      this.classList.toggle('on');
    });
  });

  /* ── sort ── */
  document.getElementById('sort-select').addEventListener('change', () => {
    if (filteredWords.length > 0) { filteredWords = doSort(filteredWords); currentPage = 1; renderPage(); }
  });

  function doSort(arr) {
    const v = document.getElementById('sort-select').value;
    const a = [...arr];
    if (v === 'alpha')     a.sort((x,y) => x.localeCompare(y));
    if (v === 'alpha-rev') a.sort((x,y) => y.localeCompare(x));
    if (v === 'len-asc')   a.sort((x,y) => x.length-y.length || x.localeCompare(y));
    if (v === 'len-desc')  a.sort((x,y) => y.length-x.length || x.localeCompare(y));
    return a;
  }

  /* ── filter ── */
  function getFilters() {
    return {
      starts:      g('f-starts').toLowerCase(),
      ends:        g('f-ends').toLowerCase(),
      contains:    g('f-contains').toLowerCase(),
      notcontains: g('f-notcontains').toLowerCase(),
      minlen:      parseInt(g('f-minlen')) || 0,
      maxlen:      parseInt(g('f-maxlen')) || Infinity,
      exactlen:    parseInt(g('f-exactlen')) || 0,
      hasletters:  g('f-hasletters').toLowerCase().replace(/\s/g,''),
      onlyletters: g('f-onlyletters').toLowerCase().replace(/\s/g,''),
      regex:       g('f-regex'),
      lchar:       g('f-lchar').toLowerCase(),
      lcount:      g('f-lcount'),
      palindrome:  document.getElementById('tc-palindrome').classList.contains('on'),
      doubles:     document.getElementById('tc-doubles').classList.contains('on'),
      vowelonly:   document.getElementById('tc-vowelonly').classList.contains('on'),
    };
  }
  function g(id) { return document.getElementById(id).value.trim(); }

  function doFilter(f) {
    const VOWELS = new Set('aeiou');
    let rx = null;
    if (f.regex) { try { rx = new RegExp(f.regex, 'i'); } catch {} }
    const onlySet = f.onlyletters ? new Set(f.onlyletters) : null;

    return allWords.filter(word => {
      const w = word.toLowerCase();
      if (f.starts && !w.startsWith(f.starts)) return false;
      if (f.ends && !w.endsWith(f.ends)) return false;
      if (f.contains && !w.includes(f.contains)) return false;
      if (f.notcontains && w.includes(f.notcontains)) return false;
      if (f.minlen && w.length < f.minlen) return false;
      if (f.maxlen < Infinity && w.length > f.maxlen) return false;
      if (f.exactlen && w.length !== f.exactlen) return false;
      if (f.hasletters) { for (const c of f.hasletters) if (!w.includes(c)) return false; }
      if (onlySet) { for (const c of w) if (!onlySet.has(c)) return false; }
      if (rx && !rx.test(w)) return false;
      if (f.lchar && f.lcount !== '') {
        const n = parseInt(f.lcount), ct = [...w].filter(c => c === f.lchar).length;
        if (ct !== n) return false;
      }
      if (f.palindrome && w !== [...w].reverse().join('')) return false;
      if (f.doubles && !/(.)\1/.test(w)) return false;
      if (f.vowelonly) { for (const c of w) if (!VOWELS.has(c)) return false; }
      return true;
    });
  }

  /* ── search ── */
  function runSearch() {
    if (!allWords.length) return;
    filteredWords = doSort(doFilter(getFilters()));
    currentPage = 1;
    renderPage();
  }

  function clearAll() {
    document.querySelectorAll('#filter-dock input[type=text], #filter-dock input[type=number]')
      .forEach(i => i.value = '');
    ['tc-palindrome','tc-doubles','tc-vowelonly'].forEach(id =>
      document.getElementById(id).classList.remove('on'));
    filteredWords = [];
    document.getElementById('page-body').innerHTML =
      `<div class="empty-state"><div class="empty-icon">ℓ</div><p>Filters cleared</p><small>Enter new filters and search</small></div>`;
    document.getElementById('pagination').style.display = 'none';
    document.getElementById('match-badge').classList.remove('visible');
  }

  document.getElementById('btn-search').addEventListener('click', runSearch);
  document.getElementById('btn-clear').addEventListener('click', clearAll);
  document.querySelectorAll('#filter-dock input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
  });

  /* ── render ── */
  function renderPage() {
    const body = document.getElementById('page-body');
    const badge = document.getElementById('match-badge');

    badge.textContent = filteredWords.length.toLocaleString() + ' words';
    badge.classList.toggle('visible', filteredWords.length > 0);

    if (!filteredWords.length) {
      body.innerHTML = `<div class="empty-state"><div class="empty-icon">∅</div><p>No matches found</p><small>Try adjusting your filters</small></div>`;
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    const start = (currentPage-1) * perPage;
    const slice = filteredWords.slice(start, start + perPage);

    const grid = document.createElement('div');
    grid.className = 'words-grid';
    slice.forEach((word, i) => {
      const card = document.createElement('div');
      card.className = 'word-card';
      card.style.fontFamily = resultFont;
      card.style.animationDelay = Math.min(i * 5, 90) + 'ms';
      card.innerHTML = `<div>${esc(word)}</div><div class="word-len">${word.length} letters</div>`;
      card.addEventListener('click', () => handleWordClick(word));
      grid.appendChild(card);
    });

    body.innerHTML = '';
    body.appendChild(grid);
    renderPagination(Math.ceil(filteredWords.length / perPage));
  }

  function renderPagination(total) {
    const pg = document.getElementById('pagination');
    pg.style.display = total <= 1 ? 'none' : 'flex';
    if (total <= 1) return;
    pg.innerHTML = '';

    const mkBtn = (label, disabled) => {
      const b = document.createElement('button');
      b.className = 'pg-btn'; b.textContent = label; b.disabled = disabled;
      return b;
    };

    const prev = mkBtn('←', currentPage === 1);
    prev.addEventListener('click', () => { currentPage--; renderPage(); document.getElementById('page-body').scrollTop = 0; });
    pg.appendChild(prev);

    const pages = (() => {
      if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
      const p = [1];
      const lo = Math.max(2, currentPage-2), hi = Math.min(total-1, currentPage+2);
      if (lo > 2) p.push('…');
      for (let i = lo; i <= hi; i++) p.push(i);
      if (hi < total-1) p.push('…');
      p.push(total);
      return p;
    })();

    pages.forEach(p => {
      if (p === '…') {
        const el = document.createElement('span');
        el.className = 'pg-ellipsis'; el.textContent = '…'; pg.appendChild(el);
      } else {
        const btn = mkBtn(p, false);
        if (p === currentPage) btn.classList.add('active');
        btn.addEventListener('click', () => { currentPage = p; renderPage(); document.getElementById('page-body').scrollTop = 0; });
        pg.appendChild(btn);
      }
    });

    const next = mkBtn('→', currentPage === total);
    next.addEventListener('click', () => { currentPage++; renderPage(); document.getElementById('page-body').scrollTop = 0; });
    pg.appendChild(next);

    const info = document.createElement('span');
    info.className = 'pg-info';
    const s = (currentPage-1)*perPage+1, e = Math.min(currentPage*perPage, filteredWords.length);
    info.textContent = `${s}–${e} / ${filteredWords.length.toLocaleString()}`;
    pg.appendChild(info);
  }

  /* ── word click ── */
  function handleWordClick(word) {
    if (clickAction === 'copy')  { copyText(word, `Copied "${word}"`); return; }
    if (clickAction === 'modal') { openModal(word); return; }
  }

  function openModal(word) {
    activeWord = word;
    const w = word.toLowerCase();
    document.getElementById('modal-word-text').textContent = word;
    document.getElementById('modal-len').textContent = word.length;
    document.getElementById('modal-vowels').textContent = [...w].filter(c => 'aeiou'.includes(c)).length;
    document.getElementById('modal-unique').textContent = new Set(w).size;
    document.getElementById('modal-overlay').classList.add('open');
  }

  document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal-overlay').classList.remove('open'));
  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') document.getElementById('modal-overlay').classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open'); });

  document.getElementById('modal-copy').addEventListener('click', () => copyText(activeWord, `Copied "${activeWord}"`));

  document.getElementById('modal-starts').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('f-starts').value = activeWord;
    document.getElementById('f-ends').value = '';
    runSearch();
    switchToMain();
  });
  document.getElementById('modal-ends').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('f-ends').value = activeWord;
    document.getElementById('f-starts').value = '';
    runSearch();
    switchToMain();
  });

  function switchToMain() {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.panel === 'main'));
    document.getElementById('main-panel').classList.remove('hidden');
    document.getElementById('settings-panel').classList.remove('active');
  }

  /* ── utils ── */
  function copyText(text, msg) {
    navigator.clipboard.writeText(text).then(() => showToast(msg));
  }
  function showToast(msg) {
    const t = document.getElementById('copy-toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

})();
</script>
</body>
</html>
